<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Good News Daily</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero">
        <p class="eyebrow">Daily signal, less noise</p>
        <h1>Good news for today, plus affirmations that rotate every day.</h1>
        <p class="intro">
          This page pulls uplifting stories from live positive-news feeds and pairs
          them with a fresh set of daily affirmations.
        </p>
        <div class="hero-meta">
          <span id="generated-at">Loading today’s update...</span>
        </div>
      </section>

      <section class="content-grid">
        <section class="panel panel-accent">
          <div class="panel-header">
            <p class="section-kicker">Affirmations</p>
            <h2>Today’s set</h2>
          </div>
          <ul id="affirmations" class="affirmation-list"></ul>
        </section>

        <section class="panel">
          <div class="panel-header">
            <p class="section-kicker">Good news</p>
            <h2>Fresh stories</h2>
          </div>
          <div id="news" class="news-list"></div>
        </section>
      </section>
    </main>

    <template id="news-card-template">
      <article class="news-card">
        <p class="news-source"></p>
        <h3></h3>
        <p class="news-summary"></p>
        <a class="news-link" target="_blank" rel="noreferrer">Open story</a>
      </article>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
